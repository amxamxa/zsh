[display]
use_pager = true
compact = true

[style.command_name]
foreground = "red"
underline = false
bold = true
italic = false

[style.example_text]
foreground = "green"

[style.example_code]
foreground = "blue"

[style.example_variable]
foreground = "blue"
underline = true

[updates]
auto_update = false

[directories]
cache_dir = "/share/zsh/tldr/"
custom_pages_dir = "/share/zsh/tldr/custom-tldr-pages/"
